<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Quiz Console · Dark</title>
    <!-- Firebase compat (v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #eef2f5;
            padding: 2.2rem 2rem;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* headings – no emoji, clean */
        h1 {
            font-weight: 450;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            margin-bottom: 2.5rem;
            border-left: 5px solid #7b9acc;
            padding-left: 1.2rem;
            color: #ffffff;
        }

        h2 {
            font-weight: 450;
            font-size: 1.7rem;
            margin: 0 0 1.2rem 0;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid #2a3a4a;
            padding-bottom: 0.5rem;
        }

        /* cards for sections – subtle, readable */
        .section-card {
            background: #16212b;
            border-radius: 24px;
            padding: 2rem 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.7);
            border: 1px solid #2a3f50;
        }

        /* search row */
        .search-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            background: #1e2c38;
            border-radius: 40px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            max-width: 380px;
            border: 1px solid #3a5060;
            transition: 0.15s;
        }
        .search-wrapper:focus-within {
            border-color: #7b9acc;
            box-shadow: 0 0 0 2px #1f3a4b;
        }
        .search-icon {
            color: #9bb8da;
            font-size: 1rem;
            margin-right: 0.75rem;
            opacity: 0.8;
        }
        .search-wrapper input {
            background: transparent;
            border: none;
            color: #f0f5fa;
            font-size: 1rem;
            padding: 0.8rem 0;
            width: 100%;
            outline: none;
        }
        .search-wrapper input::placeholder {
            color: #7f95ab;
            font-weight: 300;
        }

        /* tables */
        .table-responsive {
            overflow-x: auto;
            border-radius: 18px;
            background: #0f1a21;
            border: 1px solid #253a48;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 550px;
        }

        th {
            text-align: left;
            padding: 1.2rem 1.2rem;
            background-color: #1b2b36;
            color: #b6d0e8;
            font-weight: 500;
            letter-spacing: 0.02em;
            white-space: nowrap;
            border-bottom: 2px solid #2f4858;
        }

        td {
            padding: 1.1rem 1.2rem;
            border-bottom: 1px solid #263b48;
            color: #dbe9f5;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* small tags / labels */
        .label-tag {
            background: #1e3240;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #cbdae6;
            display: inline-block;
            font-weight: 400;
            border: 1px solid #345066;
        }

        .timestamp {
            color: #a0bedb;
            font-size: 0.85rem;
            font-weight: 300;
        }

        .loading-row td {
            text-align: center;
            padding: 3rem;
            color: #9eb7cf;
            font-style: italic;
        }

        /* numeric values */
        .value-number {
            font-weight: 450;
            color: #e1efff;
        }

        /* subtle hover */
        tbody tr:hover td {
            background-color: #1c2e3c;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Quiz · attempts console</h1>

    <!-- QUIZZES section (no action column) -->
    <div class="section-card">
        <h2>Quizzes</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Giver name</th>
                        <th>Gender</th>
                        <th>Max salami</th>
                        <th>Created at</th>
                    </tr>
                </thead>
                <tbody id="quizzes-body">
                    <tr class="loading-row"><td colspan="4">Loading quizzes ...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ATTEMPTS section with search -->
    <div class="section-card">
        <h2>Attempts</h2>
        <div class="search-wrapper">
            <span class="search-icon">⌕</span>
            <input type="text" id="search-attempts" placeholder="Search by giver name (from quiz)" autocomplete="off">
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Giver name</th>
                        <th>Receiver name</th>
                        <th>Salami amount</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="attempts-body">
                    <tr class="loading-row"><td colspan="4">Loading attempts ...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBntFpfU0pXRC9q7-mVeMP3Nhqb44Gaens",
            authDomain: "quiz-cbd2d.firebaseapp.com",
            projectId: "quiz-cbd2d",
            storageBucket: "quiz-cbd2d.firebasestorage.app",
            messagingSenderId: "152233779471",
            appId: "1:152233779471:web:18df8375f7cd5389c89e7a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DOM elements
        const quizzesBody = document.getElementById('quizzes-body');
        const attemptsBody = document.getElementById('attempts-body');
        const searchInput = document.getElementById('search-attempts');

        // Store quizzes by ID for later join
        const quizzesMap = new Map();   // quizId -> { giverName, gender, maxSalami, createdAt }

        // Raw attempts data (with resolved giverName)
        let attemptsRaw = [];
        let filteredAttempts = [];

        // Helper: format Firestore timestamp
        function formatDate(timestamp) {
            if (!timestamp) return '—';
            if (timestamp?.toDate) {
                const d = timestamp.toDate();
                return d.toLocaleString('en-US', { 
                    month: 'short', day: 'numeric', year: 'numeric', 
                    hour: '2-digit', minute: '2-digit' 
                });
            }
            return String(timestamp);
        }

        // Escape for safety (though content is trusted)
        function escapeHtml(unsafe) {
            if (unsafe == null) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Load quizzes first (populate map and table)
        async function loadQuizzes() {
            try {
                const snapshot = await db.collection('quizzes').get();
                if (snapshot.empty) {
                    quizzesBody.innerHTML = `<tr><td colspan="4" style="text-align:center;">No quizzes found</td></tr>`;
                    return;
                }

                let htmlRows = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const docId = doc.id;
                    // store minimal data needed for attempts join
                    quizzesMap.set(docId, {
                        giverName: data.giverName || 'Unknown',
                        gender: data.gender || '—',
                        maxSalami: data.maxSalami ?? 0,
                        createdAt: data.createdAt || null,
                    });

                    // quizzes table row (no action)
                    const createdStr = formatDate(data.createdAt);
                    htmlRows += `<tr>
                        <td><span class="label-tag">${escapeHtml(data.giverName) || '—'}</span></td>
                        <td>${escapeHtml(data.gender) || '—'}</td>
                        <td class="value-number">${data.maxSalami ?? 0}</td>
                        <td class="timestamp">${createdStr}</td>
                    </tr>`;
                });
                quizzesBody.innerHTML = htmlRows;
            } catch (error) {
                console.error('Error loading quizzes:', error);
                quizzesBody.innerHTML = `<tr><td colspan="4" style="color:#cf6679;">Failed to load quizzes</td></tr>`;
            }
        }

        // Load attempts, join with quiz data, and render
        async function loadAttempts() {
            try {
                const snapshot = await db.collection('attempts').get();
                if (snapshot.empty) {
                    attemptsBody.innerHTML = `<tr><td colspan="4" style="text-align:center;">No attempts recorded</td></tr>`;
                    return;
                }

                attemptsRaw = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const quizId = data.quizId;
                    const quizInfo = quizzesMap.get(quizId) || { giverName: '— (missing quiz)' };

                    const attemptItem = {
                        giverName: quizInfo.giverName || '—',
                        receiverName: data.receiverName || '—',
                        salamiAmount: data.salamiAmount ?? 0,
                        timestamp: data.timestamp || null,
                    };
                    attemptsRaw.push(attemptItem);
                });

                // sort by timestamp descending (newest first)
                attemptsRaw.sort((a, b) => {
                    const ta = a.timestamp?.toDate?.() || 0;
                    const tb = b.timestamp?.toDate?.() || 0;
                    return tb - ta;
                });

                filteredAttempts = [...attemptsRaw];
                renderAttemptsTable(filteredAttempts);
            } catch (error) {
                console.error('Error loading attempts:', error);
                attemptsBody.innerHTML = `<tr><td colspan="4" style="color:#cf6679;">Error loading attempts</td></tr>`;
            }
        }

        // Render attempts table based on array
        function renderAttemptsTable(attempts) {
            if (!attempts.length) {
                attemptsBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:2.5rem;">No matching attempts</td></tr>`;
                return;
            }

            let rows = '';
            attempts.forEach(att => {
                const timeStr = formatDate(att.timestamp);
                rows += `<tr>
                    <td><span class="label-tag">${escapeHtml(att.giverName)}</span></td>
                    <td>${escapeHtml(att.receiverName)}</td>
                    <td class="value-number">${att.salamiAmount}</td>
                    <td class="timestamp">${timeStr}</td>
                </tr>`;
            });
            attemptsBody.innerHTML = rows;
        }

        // Filter attempts by giverName (case‑insensitive)
        function filterAttempts(searchTerm) {
            const term = searchTerm.trim().toLowerCase();
            if (term === '') {
                filteredAttempts = [...attemptsRaw];
            } else {
                filteredAttempts = attemptsRaw.filter(item =>
                    item.giverName.toLowerCase().includes(term)
                );
            }
            renderAttemptsTable(filteredAttempts);
        }

        // Search input handler
        searchInput.addEventListener('input', (e) => {
            filterAttempts(e.target.value);
        });

        // Initialize: load quizzes, then attempts (order matters)
        (async function init() {
            await loadQuizzes();
            await loadAttempts();
        })();

    })();
</script>
</body>
</html>
